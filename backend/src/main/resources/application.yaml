spring:
  application:
    name: kama-notes
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  profiles:
    active: dev
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 10000
    jedis:
      pool:
        enabled: on
        max-active: 64
        max-idle: 32
        min-idle: 8
        max-wait: 2000
  mail:
    host: smtp.qq.com
    port: 465
    username: 2131992126@qq.com
    password: awlrrvwqhbstbecd
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
    protocol: smtps
    default-encoding: UTF-8

note:
  review:
    stream-key: stream:note:review
    group: group:note:review
    consumer-prefix: note-review-consumer
    retry-z-set-key: zset:note:review:retry
    read-block-millis: 5000
    batch-size: 10
    max-retry-count: 5
    base-retry-delay-seconds: 30
    max-retry-delay-seconds: 600
    mock-result-delay-millis: 0
    pending-idle-millis: 60000
    reclaim-batch-size: 20
    claim-interval-millis: 15000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.kama.notes.entity.custom
  type-handlers-package: com.kama.notes.typehandler

jwt:
  secret: abc123
  expiration: 2592000

server:
  port: 8080

# 自定义邮件配置
mail:
  verify-code:
    expire-minutes: 15  # 验证码过期时间 15 min
    limit-expire-seconds: 60  # 发送过一次验证码后，在 60s 内不能再发送验证码，用于限流
    template-path: "templates/mail/verify-code.html"

# 敏感词库配置（指向词库目录，支持 classpath: 前缀）
sensitive-words:
  path: classpath:sensitive-words

# 阿里云内容安全配置
aliyun:
  content-security:
    access-key-id: 
    access-key-secret: 
    region-id: cn-shanghai
    endpoint: green-cip.cn-shanghai.aliyuncs.com

storage:
  type: minio

upload:
  path: ./uploads
  url-prefix: http://localhost:8080/images

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: kama-notes
  public-url: http://127.0.0.1:9000/kama-notes
